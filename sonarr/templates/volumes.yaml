{{- if and (not .Values.persistence.downloads.claimName) .Values.persistence.downloads.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ template "sonarr.fullname" . }}-downloads
  labels:
    app: {{ template "sonarr.name" . }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    component: downloads
spec:
  accessModes:
  - {{ .Values.persistence.downloads.accessMode | quote }}
  resources:
    requests:
      storage: {{ .Values.persistence.downloads.size | quote }}
{{- if .Values.persistence.downloads.storageClass }}
  storageClassName: {{ .Values.persistence.downloads.storageClass | quote }}
{{- end }}
---
{{- end }}
{{- if not .Values.persistence.config.claimName }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ template "sonarr.fullname" . }}-config
  labels:
    app: {{ template "sonarr.name" . }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    component: config
spec:
  accessModes:
  - {{ .Values.persistence.config.accessMode | quote }}
  resources:
    requests:
      storage: {{ .Values.persistence.config.size | quote }}
{{- if .Values.persistence.config.storageClass }}
  storageClassName: {{ .Values.persistence.config.storageClass | quote }}
{{- end }}
---
{{- end }}
{{- if not .Values.persistence.library.claimName }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ template "sonarr.fullname" . }}-library
  labels:
    app: {{ template "sonarr.name" . }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    component: library
spec:
  accessModes:
  - {{ .Values.persistence.library.accessMode | quote }}
  resources:
    requests:
      storage: {{ .Values.persistence.library.size | quote }}
{{- if .Values.persistence.library.storageClass }}
  storageClassName: {{ .Values.persistence.library.storageClass | quote }}
{{- end }}
---
{{- end }}
