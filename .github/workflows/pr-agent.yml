name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ${{ github.event.repository.private && 'self-hosted' || 'ubuntu-latest' }}
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run PR Agent on every pull request
    concurrency:
      group: pr-agent-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: PR Agent action step
        id: pragent
        uses: the-pr-agent/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER.KEY: ${{ secrets.OPENROUTER_API_KEY }}
          config.model: "openrouter/deepseek/deepseek-coder"
          config.fallback_models: '["openrouter/deepseek/deepseek-coder"]'
          config.custom_model_max_tokens: "32000"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "false"
          github_action_config.handle_push_trigger: "true"
          github_action_config.push_trigger_wait_for_initial_review: "true"
