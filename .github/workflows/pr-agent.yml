name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ${{ github.event.repository.private && 'self-hosted' || 'ubuntu-latest' }}
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run PR Agent Review
    steps:
      - name: PR Agent action step
        id: pragent
        uses: the-pr-agent/pr-agent@v0.36.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER.KEY: ${{ secrets.OPENROUTER_API_KEY }}
          config.model: "openrouter/owl-alpha"
          config.fallback_models: '["openrouter/qwen/qwen3-coder:free"]'
          config.custom_model_max_tokens: "65536"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "false"
          github_action_config.handle_push_trigger: "true"
          github_action_config.push_trigger_wait_for_initial_review: "true"

  auto_approve:
    needs: pr_agent_job
    if: ${{ github.event_name == 'pull_request' && github.event.sender.type != 'Bot' }}
    runs-on: ${{ github.event.repository.private && 'self-hosted' || 'ubuntu-latest' }}
    permissions:
      pull-requests: write
      contents: read
      issues: read
    name: Auto-approve if review is clean
    steps:
      - name: Check PR-Agent review and approve
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            
            // Get PR review comments (not issue comments) from the bot
            const { data: reviewComments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 10,
              sort: 'updated',
              direction: 'desc',
            });
            
            // Find the latest PR-Agent persistent review comment
            const agentReviewComments = reviewComments.filter(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('PR Reviewer Guide')
            );
            
            if (agentReviewComments.length === 0) {
              console.log('No PR-Agent review found, skipping');
              return;
            }
            
            const latestReview = agentReviewComments[0]; // Already sorted desc by updated
            const reviewBody = latestReview.body;
            
            // Check for blocking conditions
            const hasSecurityLabel = reviewBody.includes('possible security issue');
            const hasCriticalEmoji = reviewBody.includes('🔴') || reviewBody.includes('⛔');
            
            // Check if there are actual findings (not just the template header)
            // A clean review has the template but minimal or no specific issues listed
            const findingsMatch = reviewBody.match(/(?:focus areas for review|Recommended focus areas)([\s\S]*?)(?:<\/details>|<\/table>)/i);
            const hasSubstantialFindings = findingsMatch && findingsMatch[1].trim().length > 50;
            
            if (hasSecurityLabel || hasCriticalEmoji || hasSubstantialFindings) {
              console.log('Issues found, requesting changes');
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'REQUEST_CHANGES',
                body: '🤖 PR-Agent found issues that should be addressed:\n\n' +
                  (hasSecurityLabel ? '- ⚠️ Security concerns detected\n' : '') +
                  (hasCriticalEmoji ? '- 🔴 Critical findings detected\n' : '') +
                  (hasSubstantialFindings ? '- 📋 Review findings need attention\n' : '') +
                  '\nPlease address the issues found in the review above.',
              });
            } else {
              console.log('Review looks clean, auto-approving');
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'APPROVE',
                body: '🤖 PR-Agent auto-approval: Review passed with no critical issues.',
              });
            }
