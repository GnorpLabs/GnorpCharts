name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ${{ github.event.repository.private && 'self-hosted' || 'ubuntu-latest' }}
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run PR Agent Review
    steps:
      - name: PR Agent action step
        id: pragent
        uses: the-pr-agent/pr-agent@v0.36.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER.KEY: ${{ secrets.OPENROUTER_API_KEY }}
          config.model: "openrouter/owl-alpha"
          config.fallback_models: '["openrouter/qwen/qwen3-coder:free"]'
          config.custom_model_max_tokens: "65536"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "false"
          github_action_config.handle_push_trigger: "true"
          github_action_config.push_trigger_wait_for_initial_review: "true"

  auto_approve:
    needs: pr_agent_job
    if: ${{ github.event_name == 'pull_request' && github.event.sender.type != 'Bot' }}
    runs-on: ${{ github.event.repository.private && 'self-hosted' || 'ubuntu-latest' }}
    permissions:
      pull-requests: write
      contents: read
      issues: read
    name: Auto-approve if review is clean
    steps:
      - name: Wait for PR-Agent review to post
        run: sleep 30

      - name: Check PR-Agent review and approve
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;

            // PR-Agent posts as issue comments, not review comments
            const { data: allComments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 20,
              sort: 'updated',
              direction: 'desc',
            });

            // Find the latest PR-Agent persistent review
            const agentReviews = allComments.filter(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('PR Reviewer Guide')
            );

            if (agentReviews.length === 0) {
              console.log('No PR-Agent review found, skipping auto-approve');
              return;
            }

            const review = agentReviews[0];
            const body = review.body;

            console.log('Found PR-Agent review, analyzing...');

            // Check for blocking conditions
            const hasSecurityLabel = body.includes('possible security issue');
            const hasCriticalEmoji = body.includes('🔴') || body.includes('⛔');
            
            // Check if findings section has real content
            const findingsMatch = body.match(/Recommended focus areas[\s\S]*?<details>([\s\S]*?)<\/details>/i);
            const hasRealFindings = findingsMatch && 
              findingsMatch[1].trim().length > 100 &&
              !findingsMatch[1].includes('No specific focus areas');

            if (hasSecurityLabel || hasCriticalEmoji || hasRealFindings) {
              console.log('Issues found, requesting changes');
              const reasons = [];
              if (hasSecurityLabel) reasons.push('Security concerns detected');
              if (hasCriticalEmoji) reasons.push('Critical findings detected');
              if (hasRealFindings) reasons.push('Review findings need attention');

              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'REQUEST_CHANGES',
                body: `🤖 PR-Agent found issues that should be addressed:\n\n${reasons.map(r => '- ⚠️ ' + r).join('\n')}\n\nPlease address the issues found in the review above.`,
              });
            } else {
              console.log('Review looks clean, auto-approving');
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'APPROVE',
                body: '🤖 PR-Agent auto-approval: Review passed with no critical issues.',
              });
            }
